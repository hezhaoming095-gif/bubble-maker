// ==================== HELPERS ====================
function adjustColor(hex, amount) {
  let c = hex.replace('#','');
  if (c.length === 3) c = c.split('').map(x => x+x).join('');
  let r = parseInt(c.substring(0,2), 16) + amount;
  let g = parseInt(c.substring(2,4), 16) + amount;
  let b = parseInt(c.substring(4,6), 16) + amount;
  r = Math.max(0, Math.min(255, r));
  g = Math.max(0, Math.min(255, g));
  b = Math.max(0, Math.min(255, b));
  return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}

function fileToBase64(file) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = (e) => resolve(e.target.result);
    reader.readAsDataURL(file);
  });
}

// ==================== MESSAGE EDITOR ====================

          </div>
        </div>
        <textarea className="config-input" rows={2} value={msg.text} onChange={(e) => onUpdate({ ...msg, text: e.target.value })} placeholder="韩文/原文内容" style={{ marginBottom: 6, resize: 'vertical' }} />
        <div style={{ display: 'flex', gap: 8, marginBottom: 6 }}>
          <label style={{ display: 'flex', alignItems: 'center', gap: 4, fontSize: 12, color: '#aaa', cursor: 'pointer' }}>
            <input type="checkbox" checked={msg.showTranslate || false} onChange={(e) => onUpdate({ ...msg, showTranslate: e.target.checked })} />
            显示翻译
          </label>
          <label style={{ display: 'flex', alignItems: 'center', gap: 4, fontSize: 12, color: '#aaa', cursor: 'pointer' }}>
            <input type="checkbox" checked={msg.showTranslateIcon || false} onChange={(e) => onUpdate({ ...msg, showTranslateIcon: e.target.checked })} />
            翻译图标 <span style={{ fontSize: 10, background: 'rgba(255,255,255,0.1)', borderRadius: 4, padding: '1px 4px' }}>Ⓐ</span>
          </label>
        </div>
        {msg.showTranslate && (
          <textarea className="config-input" rows={2} value={msg.translation || ''} onChange={(e) => onUpdate({ ...msg, translation: e.target.value })} placeholder="中文翻译内容" style={{ marginBottom: 6, resize: 'vertical', borderColor: 'rgba(20,184,166,0.3)' }} />
        )}
        <input className="config-input" value={msg.time || ''} onChange={(e) => onUpdate({ ...msg, time: e.target.value })} placeholder="时间戳 (如 19:00)" style={{ maxWidth: 120 }} />
      </div>
    );
  }

  if (msg.type === 'artist-image') {
    return (
      <div className="msg-item fade-in">
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 }}>
          <span style={{ fontSize: 11, color: '#3b82f6', fontWeight: 600 }}><i className="fas fa-image"></i> 爱豆图片</span>
          <div style={{ display: 'flex', gap: 4 }}>
            <button onClick={onMoveUp} className="btn-secondary" style={{ padding: '4px 8px', fontSize: 11 }}><i className="fas fa-arrow-up"></i></button>
            <button onClick={onMoveDown} className="btn-secondary" style={{ padding: '4px 8px', fontSize: 11 }}><i className="fas fa-arrow-down"></i></button>
            <button onClick={onDelete} className="btn-danger"><i className="fas fa-trash"></i></button>
          </div>
        </div>
        <input type="file" accept="image/*" onChange={async (e) => {
          if (e.target.files[0]) {
            const base64 = await fileToBase64(e.target.files[0]);
            onUpdate({ ...msg, imageSrc: base64 });
          }
        }} style={{ marginBottom: 6, fontSize: 12, color: '#aaa' }} />
        {msg.imageSrc && <img src={msg.imageSrc} style={{ maxWidth: 100, borderRadius: 8, marginBottom: 6 }} />}
        <input className="config-input" value={msg.time || ''} onChange={(e) => onUpdate({ ...msg, time: e.target.value })} placeholder="时间戳" style={{ maxWidth: 120 }} />
      </div>
    );
  }

  if (msg.type === 'user') {
    return (
      <div className="msg-item fade-in">
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 }}>
          <span style={{ fontSize: 11, color: '#a78bfa', fontWeight: 600 }}><i className="fas fa-user"></i> 我的消息</span>
          <div style={{ display: 'flex', gap: 4 }}>
            <button onClick={onMoveUp} className="btn-secondary" style={{ padding: '4px 8px', fontSize: 11 }}><i className="fas fa-arrow-up"></i></button>
            <button onClick={onMoveDown} className="btn-secondary" style={{ padding: '4px 8px', fontSize: 11 }}><i className="fas fa-arrow-down"></i></button>
            <button onClick={onDelete} className="btn-danger"><i className="fas fa-trash"></i></button>
          </div>
        </div>
        <textarea className="config-input" rows={2} value={msg.text} onChange={(e) => onUpdate({ ...msg, text: e.target.value })} placeholder="你的回复消息" style={{ marginBottom: 6, resize: 'vertical' }} />
        <input className="config-input" value={msg.time || ''} onChange={(e) => onUpdate({ ...msg, time: e.target.value })} placeholder="时间戳 (如 19:03)" style={{ maxWidth: 120 }} />
      </div>
    );
  }
  return null;
}

// ==================== MAIN APP ====================
function App() {
  const [config, setConfig] = useState({
    nickname: '준머니',
    avatar: null,
    bgColor: '#f8f8fa',
    bgImage: null,
    themeColor: '#c4b5fd',
    badgeEmoji: '💜',
    bubbleCount: 2,
  });
  const [messages, setMessages] = useState(DEFAULT_MESSAGES);
  const phoneRef = useRef(null);
  const fileInputRef = useRef(null);
  const bgFileInputRef = useRef(null);
  const importInputRef = useRef(null);

  // Avatar upload
  const handleAvatarUpload = async (e) => {
    if (e.target.files[0]) {
      const base64 = await fileToBase64(e.target.files[0]);
      setConfig(prev => ({ ...prev, avatar: base64 }));
    }
  };

  // BG image upload
  const handleBgUpload = async (e) => {
    if (e.target.files[0]) {
      const base64 = await fileToBase64(e.target.files[0]);
      setConfig(prev => ({ ...prev, bgImage: base64 }));
    }
  };

  // Add message
  const addMessage = (type) => {
    const id = genId();
    let newMsg;
    switch(type) {
      case 'date':
        newMsg = { id, type: 'date', text: '2026年4月18日 星期五' };
        break;
      case 'artist':
        newMsg = { id, type: 'artist', text: '', translation: '', showTranslate: true, showTranslateIcon: true, time: '19:00' };
        break;
      case 'artist-image':
        newMsg = { id, type: 'artist-image', imageSrc: '', time: '19:00' };
        break;
      case 'user':
        newMsg = { id, type: 'user', text: '', time: '19:00' };
        break;
      default: return;
    }
    setMessages(prev => [...prev, newMsg]);
  };

  // Update message
  const updateMessage = (id, updated) => {
    setMessages(prev => prev.map(m => m.id === id ? updated : m));
  };

  // Delete message
  const deleteMessage = (id) => {
    setMessages(prev => prev.filter(m => m.id !== id));
  };

  // Move message
  const moveMessage = (id, dir) => {
    setMessages(prev => {
      const idx = prev.findIndex(m => m.id === id);
      if (idx < 0) return prev;
      const newIdx = idx + dir;
      if (newIdx < 0 || newIdx >= prev.length) return prev;
      const arr = [...prev];
      [arr[idx], arr[newIdx]] = [arr[newIdx], arr[idx]];
      return arr;
    });
  };

  // Apply preset
  const applyPreset = (preset) => {
    setConfig(prev => ({
      ...prev,
      nickname: preset.nickname,
      themeColor: preset.themeColor,
      bgColor: preset.bgColor,
      badgeEmoji: preset.badgeEmoji,
      avatar: preset.avatar || prev.avatar,
    }));
  };

  // Export JSON
  const exportJSON = () => {
    const data = { config: { ...config }, messages };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `bubble-backup-${Date.now()}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  // Import JSON
  const importJSON = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.config) setConfig(data.config);
        if (data.messages) setMessages(data.messages);
        alert('✅ 存档载入成功！');
      } catch(err) {
        alert('❌ 文件格式错误，请选择正确的JSON存档文件。');
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  };

  // Screenshot
  const takeScreenshot = () => {
    const el = phoneRef.current;
    if (!el) return;
    html2canvas(el, {
      scale: 3,
      useCORS: true,
      allowTaint: true,
      backgroundColor: null,
    }).then(canvas => {
      canvas.toBlob((blob) => {
        if (!blob) return;
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.download = `bubble-screenshot-${Date.now()}.png`;
        link.href = url;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
      }, 'image/png');
    }).catch(err => {
      alert('截图失败: ' + err.message);
    });
  };

  return (
    <div style={{ minHeight: '100vh', padding: '24px' }}>
      {/* Title */}
      <div style={{ textAlign: 'center', marginBottom: 28 }}>
        <h1 style={{ fontSize: 28, fontWeight: 800, background: 'linear-gradient(135deg, #c4b5fd, #8b5cf6, #ec4899)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', marginBottom: 6 }}>
          ✨ Bubble 泡泡截图生成器
        </h1>
        <p style={{ fontSize: 13, color: 'rgba(255,255,255,0.4)' }}>高保真模仿 · 一键生成 · 仅供娱乐</p>
      </div>

      {/* Main layout */}
      <div style={{ display: 'flex', gap: 28, maxWidth: 1200, margin: '0 auto', alignItems: 'flex-start', flexWrap: 'wrap', justifyContent: 'center' }}>

        {/* LEFT: Config Panel */}
        <div className="glass-panel" style={{ width: 420, padding: 24, maxHeight: '85vh', overflowY: 'auto' }}>

          {/* Presets */}
          <div style={{ marginBottom: 20 }}>
            <div className="section-title"><i className="fas fa-palette"></i> 爱豆模板 (一键换肤)</div>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 8 }}>
              {PRESETS.map((p, i) => (
                <div key={i} className="preset-btn" onClick={() => applyPreset(p)}>
                  <div style={{ width: 32, height: 32, borderRadius: '50%', background: `linear-gradient(135deg, ${p.themeColor}, ${adjustColor(p.themeColor, -30)})`, margin: '0 auto 6px', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 14 }}>
                    {p.badgeEmoji}
                  </div>
                  <div style={{ fontSize: 11, color: '#ccc', fontWeight: 500, lineHeight: 1.3 }}>{p.name}</div>
                </div>
              ))}
            </div>
          </div>

          {/* Basic config */}
          <div style={{ marginBottom: 20 }}>
            <div className="section-title"><i className="fas fa-cog"></i> 基础设置</div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
              <div>
                <label style={{ fontSize: 12, color: '#999', marginBottom: 4, display: 'block' }}>爱豆昵称</label>
                <input className="config-input" value={config.nickname} onChange={(e) => setConfig(prev => ({...prev, nickname: e.target.value}))} placeholder="输入爱豆名字" />
              </div>
              <div>
                <label style={{ fontSize: 12, color: '#999', marginBottom: 4, display: 'block' }}>头像上传</label>
                <input ref={fileInputRef} type="file" accept="image/*" onChange={handleAvatarUpload} style={{ display: 'none' }} />
                <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                  <button className="btn-secondary" onClick={() => fileInputRef.current.click()} style={{ fontSize: 13 }}>
                    <i className="fas fa-upload"></i> 选择头像
                  </button>
                  {config.avatar && <img src={config.avatar} style={{ width: 36, height: 36, borderRadius: '50%', objectFit: 'cover' }} />}
                  {config.avatar && <button className="btn-danger" onClick={() => setConfig(prev => ({...prev, avatar: null}))}>移除</button>}
                </div>
              </div>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
                <div>
                  <label style={{ fontSize: 12, color: '#999', marginBottom: 4, display: 'block' }}>气泡主题色</label>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                    <input type="color" value={config.themeColor} onChange={(e) => setConfig(prev => ({...prev, themeColor: e.target.value}))} style={{ width: 36, height: 36, border: 'none', borderRadius: 8, cursor: 'pointer', background: 'transparent' }} />
                    <span style={{ fontSize: 12, color: '#888' }}>{config.themeColor}</span>
                  </div>
                </div>
                <div>
                  <label style={{ fontSize: 12, color: '#999', marginBottom: 4, display: 'block' }}>聊天背景色</label>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                    <input type="color" value={config.bgColor} onChange={(e) => setConfig(prev => ({...prev, bgColor: e.target.value}))} style={{ width: 36, height: 36, border: 'none', borderRadius: 8, cursor: 'pointer', background: 'transparent' }} />
                    <span style={{ fontSize: 12, color: '#888' }}>{config.bgColor}</span>
                  </div>
                </div>
              </div>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
                <div>
                  <label style={{ fontSize: 12, color: '#999', marginBottom: 4, display: 'block' }}>爱心/徽章 (Emoji)</label>
                  <input className="config-input" value={config.badgeEmoji} onChange={(e) => setConfig(prev => ({...prev, badgeEmoji: e.target.value}))} placeholder="💜" style={{ maxWidth: 100 }} />
                </div>
                <div>
                  <label style={{ fontSize: 12, color: '#999', marginBottom: 4, display: 'block' }}>Bubble 计数</label>
                  <input className="config-input" type="number" min="0" value={config.bubbleCount} onChange={(e) => setConfig(prev => ({...prev, bubbleCount: parseInt(e.target.value) || 0}))} style={{ maxWidth: 100 }} />
                </div>
              </div>
              <div>
                <label style={{ fontSize: 12, color: '#999', marginBottom: 4, display: 'block' }}>背景图片 (可选)</label>
                <input ref={bgFileInputRef} type="file" accept="image/*" onChange={handleBgUpload} style={{ display: 'none' }} />
                <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                  <button className="btn-secondary" onClick={() => bgFileInputRef.current.click()} style={{ fontSize: 13 }}>
                    <i className="fas fa-image"></i> 选择背景图
                  </button>
                  {config.bgImage && <button className="btn-danger" onClick={() => setConfig(prev => ({...prev, bgImage: null}))}>移除</button>}
                </div>
              </div>
            </div>
          </div>

          {/* Messages config */}
          <div style={{ marginBottom: 20 }}>
            <div className="section-title"><i className="fas fa-comments"></i> 消息列表</div>

            {/* Add buttons */}
            <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', marginBottom: 12 }}>
              <button className="btn-primary" onClick={() => addMessage('date')} style={{ fontSize: 12 }}>
                <i className="fas fa-calendar-plus"></i> 日期线
              </button>
              <button className="btn-primary" onClick={() => addMessage('artist')} style={{ fontSize: 12, background: 'linear-gradient(135deg, #22c55e, #16a34a)' }}>
                <i className="fas fa-star"></i> 爱豆消息
              </button>
              <button className="btn-primary" onClick={() => addMessage('artist-image')} style={{ fontSize: 12, background: 'linear-gradient(135deg, #3b82f6, #2563eb)' }}>
                <i className="fas fa-image"></i> 爱豆图片
              </button>
              <button className="btn-primary" onClick={() => addMessage('user')} style={{ fontSize: 12, background: 'linear-gradient(135deg, #a78bfa, #7c3aed)' }}>
                <i className="fas fa-user"></i> 我的消息
              </button>
            </div>

            {/* Message list */}
            <div style={{ maxHeight: 340, overflowY: 'auto' }}>
              {messages.map((msg) => (
                <MessageEditor
                  key={msg.id}
                  msg={msg}
                  onUpdate={(updated) => updateMessage(msg.id, updated)}
                  onDelete={() => deleteMessage(msg.id)}
                  onMoveUp={() => moveMessage(msg.id, -1)}
                  onMoveDown={() => moveMessage(msg.id, 1)}
                />
              ))}
              {messages.length === 0 && (
                <div style={{ textAlign: 'center', color: 'rgba(255,255,255,0.2)', padding: 30, fontSize: 14 }}>
                  <i className="fas fa-inbox" style={{ fontSize: 28, marginBottom: 8, display: 'block' }}></i>
                  点击上方按钮添加消息
                </div>
              )}
            </div>
          </div>

          {/* Import / Export */}
          <div style={{ marginBottom: 16 }}>
            <div className="section-title"><i className="fas fa-database"></i> 存档管理</div>
            <div style={{ display: 'flex', gap: 8 }}>
              <button className="btn-secondary" onClick={exportJSON} style={{ flex: 1 }}>
                <i className="fas fa-download"></i> 导出存档
              </button>
              <input ref={importInputRef} type="file" accept=".json" onChange={importJSON} style={{ display: 'none' }} />
              <button className="btn-secondary" onClick={() => importInputRef.current.click()} style={{ flex: 1 }}>
                <i className="fas fa-upload"></i> 载入存档
              </button>
            </div>
          </div>

          <div style={{ textAlign: 'center', fontSize: 11, color: 'rgba(255,255,255,0.2)', marginTop: 12 }}>
            2b娱乐公司出品 月组
          </div>
        </div>

        {/* RIGHT: Phone Preview + Screenshot Button */}
        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 20 }}>
          <div ref={phoneRef}>
            <PhonePreview config={config} messages={messages} />
          </div>

          <button className="btn-primary" onClick={takeScreenshot} style={{
            padding: '14px 32px',
            fontSize: 16,
            borderRadius: 16,
            background: 'linear-gradient(135deg, #8b5cf6, #ec4899)',
            boxShadow: '0 8px 30px rgba(139,92,246,0.3)',
          }}>
            <i className="fas fa-camera"></i> 📷 一键生成高清截图
          </button>

          <p style={{ fontSize: 11, color: 'rgba(255,255,255,0.25)', textAlign: 'center', maxWidth: 300 }}>
            提示：截图将以 3 倍分辨率导出，确保在社交平台分享时清晰锐利。图片底部将包含水印声明。
          </p>
        </div>

      </div>
    </div>
  );
}

// ==================== RENDER ====================
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
